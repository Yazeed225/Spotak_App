<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Spotak</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app login-page">
    <div class="login-card">
      <!-- Brand -->
      <h1 class="brand login-brand">Spotak</h1>
      <p class="login-sub">Sign in to book your perfect spot</p>

      <!-- Login form -->
      <form id="loginForm" class="login-form" novalidate>
        <label class="field-label" for="loginEmail">Email</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" id="loginEmail" class="input-field" placeholder="forexample@gmail.com" required />
        </div>

        <label class="field-label" for="loginPassword">Password</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="loginPassword" class="input-field" placeholder="••••••••" required />
        </div>

        <p id="loginError" class="form-error" aria-live="polite"></p>

        <button type="submit" class="primary-btn">Login</button>

        <p class="signup-line">
          Don't have an account?
          <a href="#" id="signupLink">Sign up</a>
        </p>
      </form>
    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
