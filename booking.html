<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirm Your Booking — Spotak</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app booking-page">
    <!-- Header with back arrow + title -->
    <header class="page-header">
      <a href="spot.html" class="back-btn-inline" aria-label="Go back">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
      </a>
      <h1 class="page-title">Confirm Your Booking</h1>
    </header>

    <!-- Booking form card -->
    <form id="bookingForm" class="booking-card" novalidate>
      <!-- Date -->
      <label class="field-label" for="bookingDate">Date</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <input type="date" id="bookingDate" class="input-field" required />
      </div>

      <!-- Time -->
      <label class="field-label" for="bookingTime">Time</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <input type="time" id="bookingTime" class="input-field" required />
      </div>

      <!-- People -->
      <label class="field-label" for="bookingPeople">Number of People</label>
      <div class="input-wrap">
        <svg class="input-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <input type="number" id="bookingPeople" class="input-field" min="1" max="20" value="1" required />
      </div>

      <!-- Error / message area -->
      <p id="formError" class="form-error" aria-live="polite"></p>

      <!-- Fee summary -->
      <div class="fee-card">
        <div class="fee-row">
          <span class="fee-label">Table Reservation Fee</span>
          <span class="fee-amount">25 SAR</span>
        </div>
        <p class="fee-note">Refundable if canceled 24 hours in advance</p>
      </div>

      <!-- Submit -->
      <button type="submit" class="cta-btn">Confirm &amp; Pay</button>
    </form>
  </main>

  <script src="main.js"></script>
</body>
</html>
