<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotak — Find Your Perfect Spot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <!-- Top bar: brand + profile -->
    <header class="topbar">
      <h1 class="brand">Spotak</h1>
      <a href="login.html" class="profile-btn" aria-label="Profile">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </a>
    </header>

    <!-- Search input -->
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" class="search-input" placeholder="Find your perfect spot..." />
    </div>

    <!-- Filter chips -->
    <div class="chips">
      <button class="chip" data-filter="quiet">Quiet Focus</button>
      <button class="chip" data-filter="wifi">Fast Wi-Fi</button>
      <button class="chip" data-filter="247">24/7 Open</button>
      <button class="chip" data-filter="meeting">Meeting Room</button>
    </div>

    <!-- Spot cards list -->
    <section class="cards" id="cardList">
      <a class="card" href="spot.html?id=ristretto" data-name="Ristretto Cafe" data-tags="quiet wifi meeting">
        <div class="card-img" style="background-image:url('https://images.unsplash.com/photo-1554118811-1e0d58224f24?w=800');"></div>
        <div class="card-body">
          <div class="card-row">
            <div>
              <h3 class="card-title">Ristretto Cafe</h3>
              <p class="card-sub">Al Khobar</p>
            </div>
            <div class="rating">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="#F5B400" stroke="#F5B400" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              <span>4.8</span>
            </div>
          </div>
          <div class="amenities">
            <span class="amenity">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#00A693" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
              Wi-Fi
            </span>
            <span class="amenity">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#00A693" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
              Power
            </span>
          </div>
        </div>
      </a>

      <a class="card" href="spot.html?id=greenhouse" data-name="Greenhouse Coffee" data-tags="quiet wifi 247">
        <div class="card-img" style="background-image:url('https://images.unsplash.com/photo-1521017432531-fbd92d768814?w=800');"></div>
        <div class="card-body">
          <div class="card-row">
            <div>
              <h3 class="card-title">Greenhouse Coffee</h3>
              <p class="card-sub">Dammam</p>
            </div>
            <div class="rating">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="#F5B400" stroke="#F5B400" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              <span>4.6</span>
            </div>
          </div>
          <div class="amenities">
            <span class="amenity">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#00A693" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
              Wi-Fi
            </span>
            <span class="amenity">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#00A693" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
              Power
            </span>
          </div>
        </div>
      </a>

      <a class="card" href="spot.html?id=mocha" data-name="Mocha Hub" data-tags="wifi meeting 247">
        <div class="card-img" style="background-image:url('https://images.unsplash.com/photo-1559496417-e7f25cb247f3?w=800');"></div>
        <div class="card-body">
          <div class="card-row">
            <div>
              <h3 class="card-title">Mocha Hub</h3>
              <p class="card-sub">Dhahran</p>
            </div>
            <div class="rating">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="#F5B400" stroke="#F5B400" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              <span>4.7</span>
            </div>
          </div>
          <div class="amenities">
            <span class="amenity">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#00A693" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
              Wi-Fi
            </span>
            <span class="amenity">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#00A693" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
              Power
            </span>
          </div>
        </div>
      </a>

      <a class="card" href="spot.html?id=palm" data-name="Palm Reads Cafe" data-tags="quiet wifi meeting">
        <div class="card-img" style="background-image:url('https://images.unsplash.com/photo-1453614512568-c4024d13c247?w=800');"></div>
        <div class="card-body">
          <div class="card-row">
            <div>
              <h3 class="card-title">Palm Reads Cafe</h3>
              <p class="card-sub">Qatif</p>
            </div>
            <div class="rating">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="#F5B400" stroke="#F5B400" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              <span>4.5</span>
            </div>
          </div>
          <div class="amenities">
            <span class="amenity">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#00A693" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
              Wi-Fi
            </span>
            <span class="amenity">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#00A693" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
              Power
            </span>
          </div>
        </div>
      </a>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
